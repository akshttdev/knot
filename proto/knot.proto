// Knot — wire-protocol schemas.
//
// All inter-node and client RPCs use protobuf for compact, schema-versioned
// binary encoding. This file starts with placeholder messages; Raft RPCs
// (RequestVote, AppendEntries, InstallSnapshot) will be added in Week 2.

syntax = "proto3";

package knot.rpc;

// -------------------------------------------------------------------------
// Health
// -------------------------------------------------------------------------

message HealthCheckRequest {}

message HealthCheckResponse {
  string node_id = 1;
  string status  = 2;   // "ok" | "starting" | "shutting_down"
  uint64 uptime_ms = 3;
}

// -------------------------------------------------------------------------
// Common types (used by Raft + client RPCs later)
// -------------------------------------------------------------------------

message LogEntry {
  uint64 term    = 1;
  uint64 index   = 2;
  EntryType type = 3;
  bytes payload  = 4;
}

enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_NOOP        = 1;
  ENTRY_TYPE_COMMAND     = 2;
  ENTRY_TYPE_CONF_CHANGE = 3;
}

// -------------------------------------------------------------------------
// Raft RPCs (Day 14)
// -------------------------------------------------------------------------
//
// `LogEntryProto` mirrors include/knot/raft/messages.h's LogEntry. Note
// the `type` field is uint32 carrying the EntryType enum value (we use a
// plain uint32 rather than the enum directly to keep the wire stable
// across enum additions).

message RaftHandshake {
  string sender_id = 1;
}

message LogEntryProto {
  uint64 term     = 1;
  uint64 index    = 2;
  uint32 type     = 3;
  bytes  payload  = 4;
}

message RequestVoteRequest {
  uint64 term            = 1;
  string candidate_id    = 2;
  uint64 last_log_index  = 3;
  uint64 last_log_term   = 4;
}

message RequestVoteResponse {
  uint64 term         = 1;
  bool   vote_granted = 2;
}

message AppendEntriesRequest {
  uint64                  term            = 1;
  string                  leader_id       = 2;
  uint64                  prev_log_index  = 3;
  uint64                  prev_log_term   = 4;
  repeated LogEntryProto  entries         = 5;
  uint64                  leader_commit   = 6;
}

message AppendEntriesResponse {
  uint64 term            = 1;
  bool   success         = 2;
  uint64 match_index     = 3;
  uint64 conflict_index  = 4;
  uint64 conflict_term   = 5;
}

// InstallSnapshotRequest / Response will be added on Day 17.

// -------------------------------------------------------------------------
// Client RPCs (Day 16)
// -------------------------------------------------------------------------

message ClientPutRequest {
  string client_id = 1;
  uint64 seq_no    = 2;
  bytes  key       = 3;
  bytes  value     = 4;
}

message ClientPutResponse {
  bool   success     = 1;
  string leader_hint = 2;
  string error       = 3;
}

message ClientGetRequest {
  string client_id = 1;
  uint64 seq_no    = 2;
  bytes  key       = 3;
}

message ClientGetResponse {
  bool   success     = 1;
  string leader_hint = 2;
  string error       = 3;
  bool   found       = 4;
  bytes  value       = 5;
}

message ClientDeleteRequest {
  string client_id = 1;
  uint64 seq_no    = 2;
  bytes  key       = 3;
}

message ClientDeleteResponse {
  bool   success     = 1;
  string leader_hint = 2;
  string error       = 3;
}
